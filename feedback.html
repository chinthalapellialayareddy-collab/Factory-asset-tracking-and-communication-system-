<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#89f7fe,#66a6ff);
margin:0;
padding:0;
}

.container{
width:420px;
margin:120px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#333;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#4facfe;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2b7de9;
}

.home{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
font-weight:bold;
color:#333;
}

</style>
</head>

<body>

<div class="container">

<h2>Feedback</h2>

<form action="feedback.jsp" method="post">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Your Feedback</label>
<textarea name="message" rows="4" required></textarea>

<button type="submit">Submit</button>

</form>

<a class="home" href="index.html">Home</a>

</div>

</body>
</html>
