<!DOCTYPE html>
<html>
<head>
<title>User Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:350px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#333;
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:95%;
padding:12px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00c6ff;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#4facfe;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<form action="login.jsp" method="post">

<input type="text" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<a href="register.html">New User? Register</a>

</div>

</body>
</html>
