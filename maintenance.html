<!DOCTYPE html>
<html>
<head>
<title>Maintenance Request</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
margin:0;
padding:0;
}

.container{
width:420px;
margin:90px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#333;
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#ff6a88;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff3e6c;
}

</style>

</head>

<body>

<div class="container">

<h2>Maintenance Request</h2>

<form action="maintenance.jsp" method="post">

<label>Asset ID</label>
<input type="number" name="assetid" required>

<label>Problem Description</label>
<textarea name="problem" rows="4" required></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
