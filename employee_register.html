<!DOCTYPE html>
<html>
<head>
<title>Employee Registration</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#1e3c72,#2a5298);
margin:0;
padding:0;
}

.container{
width:420px;
margin:80px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:20px;
color:#2a5298;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
border-color:#2a5298;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2a5298;
color:white;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e3c72;
}

.home{
margin-top:15px;
display:block;
text-decoration:none;
color:#2a5298;
font-weight:bold;
}

.home:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>Employee Registration</h2>

<form method="post" action="employee_register.jsp">

<input type="text" name="empname" placeholder="Employee Name" required>

<input type="text" name="dept" placeholder="Department" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register Employee</button>

</form>

<a href="index.html" class="home">Back to Home</a>

</div>

</body>
</html>
